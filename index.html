                        <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                        <div class="input-bg rounded-xl p-3 flex items-center">
                            <i class="fa-regular fa-envelope text-gray-500 mr-3 text-base"></i>
                            <input type="email" id="login-email" placeholder="Enter your email address" class="bg-transparent w-full outline-none text-sm text-white">
                        </div>
                        <p class="text-xs text-gray-500 mt-2">We'll send a verification code to this email</p>
                    </div>
                    <div class="flex items-start mb-6">
                        <input type="checkbox" id="login-agree" class="mt-1 mr-2 accent-yellow-400 w-4 h-4">

                    </div>
                    <button onclick="sendMagicLink()" id="send-code-btn" class="binance-yellow-btn w-full py-3 rounded-xl font-bold mb-4 transition flex items-center justify-center gap-2">

                <div id="step-code" style="display: none;">

                        <div class="input-bg rounded-xl p-3 flex items-center">
                            <i class="fa-solid fa-key text-gray-500 mr-3 text-base"></i>

                        </div>
                        <p class="text-xs text-gray-500 mt-2">Check your email for the verification code</p>
                    </div>
                    <div id="code-error" class="error-message" style="display: none; background: rgba(246,70,93,0.1); border-left: 3px solid #f6465d; padding: 10px; border-radius: 8px; margin-bottom: 16px; font-size: 12px;">
                        <i class="fa-solid fa-circle-exclamation mr-2"></i> Invalid code. Please try again.
                    </div>
                    <button onclick="verifyMagicCode()" id="verify-code-btn" class="binance-yellow-btn w-full py-3 rounded-xl font-bold mb-3 transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-check-circle"></i> Verify & Access
                    </button>

    <script>
        // Initialization and logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('hide-loader');
                const hasSession = checkExistingSession();
                // Trigger login overlay immediately after animation
                if (!hasSession) {
                    document.getElementById('login-overlay').classList.add('active');
                }
            }, 3200);
        });

        function checkExistingSession() {
            // Simplified session check logic
            return false;
        }

        function sendMagicLink() {
            // Your magic link logic here
            document.getElementById('step-email').style.display = 'none';
            document.getElementById('step-code').style.display = 'block';
        }

        function verifyMagicCode() {
            const code = document.getElementById('magic-code').value;
            if (code.length === 6) {
                document.getElementById('login-overlay').classList.remove('active');
                document.body.classList.add('show-dashboard');
            } else {
                document.getElementById('code-error').style.display = 'block';
            }
        }
    </script>
